; PHP settings override for yulisrl-sistema
; NO incluir session.save_path ni rutas absolutas aquí
; para que el servidor use su configuración por defecto

; Sesiones - solo configuración portable
session.use_cookies = 1
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_strict_mode = 0

; Limits
max_execution_time = 300
max_input_time = 600
memory_limit = 256M
post_max_size = 128M
upload_max_filesize = 128M
